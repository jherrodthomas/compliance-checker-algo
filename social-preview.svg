<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640" role="img">
  <title>Compliance Checker Algo — Social Preview</title>
  <defs>
    <linearGradient id="sp-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B2447"/>
      <stop offset="100%" stop-color="#19376D"/>
    </linearGradient>
    <pattern id="sp-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#FFFFFF" stroke-width="0.4" stroke-opacity="0.07"/>
    </pattern>
    <radialGradient id="sp-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sp-line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0"/>
      <stop offset="50%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="640" fill="url(#sp-bg)"/>
  <rect width="1280" height="640" fill="url(#sp-grid)"/>
  <rect x="0" y="0" width="1280" height="4" fill="url(#sp-line)"/>
  <rect x="0" y="636" width="1280" height="4" fill="url(#sp-line)"/>

  <!-- Centered logo + title -->
  <g transform="translate(640, 220)">
    <circle cx="0" cy="0" r="120" fill="url(#sp-glow)"/>
    <path d="M -60 -84 L 60 -56 L 60 32 C 60 76 30 110 0 124 C -30 110 -60 76 -60 32 Z"
          fill="#FFFFFF" fill-opacity="0.04" stroke="#A5F3FC" stroke-width="2"/>
    <path d="M -45 -64 L 45 -42 L 45 22 C 45 56 22 84 0 96 C -22 84 -45 56 -45 22 Z"
          fill="#10B981" fill-opacity="0.12" stroke="#10B981" stroke-width="2.5"/>
    <path d="M -28 12 L -6 36 L 30 -10" fill="none" stroke="#10B981" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" text-anchor="middle">
    <text x="640" y="430" font-size="64" font-weight="800" fill="#FFFFFF" letter-spacing="-1.5">Compliance Checker Algo</text>
    <text x="640" y="478" font-size="22" font-weight="400" fill="#CBD5E1">Automated cross-checking against ISO 26262, IEC 61508, ISO 21434 &amp; more</text>
  </g>

  <!-- Standards chip row -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="600">
    <g transform="translate(346, 528)">
      <rect width="130" height="40" rx="20" fill="#FFFFFF" fill-opacity="0.08" stroke="#475569"/>
      <circle cx="20" cy="20" r="5" fill="#10B981"/>
      <text x="36" y="26" fill="#E2E8F0">ISO 26262</text>
    </g>
    <g transform="translate(486, 528)">
      <rect width="130" height="40" rx="20" fill="#FFFFFF" fill-opacity="0.08" stroke="#475569"/>
      <circle cx="20" cy="20" r="5" fill="#10B981"/>
      <text x="36" y="26" fill="#E2E8F0">IEC 61508</text>
    </g>
    <g transform="translate(626, 528)">
      <rect width="130" height="40" rx="20" fill="#FFFFFF" fill-opacity="0.08" stroke="#475569"/>
      <circle cx="20" cy="20" r="5" fill="#10B981"/>
      <text x="36" y="26" fill="#E2E8F0">ISO 21434</text>
    </g>
    <g transform="translate(766, 528)">
      <rect width="110" height="40" rx="20" fill="#FFFFFF" fill-opacity="0.08" stroke="#475569"/>
      <circle cx="20" cy="20" r="5" fill="#10B981"/>
      <text x="36" y="26" fill="#E2E8F0">ASPICE</text>
    </g>
    <g transform="translate(886, 528)">
      <rect width="110" height="40" rx="20" fill="none" stroke="#7DD3FC" stroke-dasharray="3 3"/>
      <text x="55" y="26" fill="#7DD3FC" text-anchor="middle">+ more</text>
    </g>
  </g>
</svg>
